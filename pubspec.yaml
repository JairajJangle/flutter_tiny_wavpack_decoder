name: flutter_tiny_wavpack_decoder
description: "Decode WavPack (.wv) audio to PCM .wav on-device via the tiny dependency-free WavPack decoder over Dart FFI, or WASM on the web. All six Flutter platforms."
version: 1.0.4
repository: https://github.com/JairajJangle/flutter_tiny_wavpack_decoder
issue_tracker: https://github.com/JairajJangle/flutter_tiny_wavpack_decoder/issues
topics:
  - audio
  - wavpack
  - codec
  - decoder
  - ffi

environment:
  sdk: ^3.9.0
  flutter: '>=3.27.0'

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  meta: ^1.15.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # This section identifies this Flutter project as an FFI plugin: the
  # native decoder in src/ is built and bundled by each platform's tooling
  # (CMake on Android/Linux/Windows, CocoaPods on iOS/macOS). There is no
  # method-channel platform code. On the web the same C code runs as WASM
  # inside a Web Worker (see web_assets/); the pluginClass there is an
  # empty registrant that only declares web support.
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: FlutterTinyWavpackDecoderWeb
        fileName: src/ftwd_web_plugin.dart

  # Prebuilt WASM decoder and its worker script, served to web apps as
  # package assets. Rebuilt from src/ by tool/build_wasm.sh; committed so
  # package consumers never need the Emscripten toolchain.
  assets:
    - web_assets/

# Config for the `cider` CLI (dart pub global activate cider), used to bump the
# version and roll the CHANGELOG at release time. See the Releasing section in
# README.md. This key is ignored by pub/flutter tooling.
cider:
  link_template:
    tag: https://github.com/JairajJangle/flutter_tiny_wavpack_decoder/releases/tag/%tag%
    diff: https://github.com/JairajJangle/flutter_tiny_wavpack_decoder/compare/%from%...%to%
