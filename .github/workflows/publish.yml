# Publishes to pub.dev when a version tag (v1.2.3) is pushed.
#
# Release flow (see the Releasing section in README.md): a maintainer bumps the
# version and rolls the CHANGELOG with cider, commits, then pushes the vX.Y.Z
# tag. The tag push triggers this workflow, which publishes to pub.dev over
# OIDC. Because the tag is pushed from a developer machine (not created inside
# an Actions run), it triggers reliably.
#
# Requires automated publishing enabled on pub.dev:
#   pub.dev > package > Admin > Automated publishing > GitHub Actions,
#   repository JairajJangle/flutter_tiny_wavpack_decoder, tag pattern v{{version}}.
# workflow_dispatch is kept as a manual fallback.
name: Publish to pub.dev

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC token exchange
    steps:
      - uses: actions/checkout@v4

      # Skip when this version is already on pub.dev, so re-running a tag is a
      # no-op instead of a hard failure.
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pub.dev/api/packages/flutter_tiny_wavpack_decoder/versions/${VERSION}")
          if [ "$CODE" = "200" ]; then
            echo "Version ${VERSION} already published; skipping."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dart-lang/setup-dart@v1 # performs the pub.dev token exchange
        if: steps.check.outputs.published == 'false'
      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.published == 'false'
        with:
          flutter-version: 3.35.7
          channel: stable
      - run: flutter pub get
        if: steps.check.outputs.published == 'false'
      - run: dart pub publish --force
        if: steps.check.outputs.published == 'false'
