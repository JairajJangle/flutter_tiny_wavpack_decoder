# Publishes to pub.dev when a version tag (v1.2.3) is pushed.
#
# INERT until you enable automated publishing for this package on pub.dev:
#   pub.dev → package → Admin → Automated publishing → GitHub Actions,
#   repository JairajJangle/flutter_tiny_wavpack_decoder, tag pattern v{{version}}.
# The first release must be published manually (`dart pub publish`).
name: Publish to pub.dev

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC token exchange
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1 # performs the pub.dev token exchange
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          channel: stable
      - run: flutter pub get
      - run: dart pub publish --force
