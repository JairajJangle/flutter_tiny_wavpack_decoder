# Publishes to pub.dev when a version tag (v1.2.3) is pushed. release.yml
# (semantic-release) creates and pushes that tag from conventional commits on
# main, so a normal merge to main drives the whole release.
#
# INERT until you enable automated publishing for this package on pub.dev:
#   pub.dev > package > Admin > Automated publishing > GitHub Actions,
#   repository JairajJangle/flutter_tiny_wavpack_decoder, tag pattern v{{version}}.
# The first release must be published manually (`dart pub publish`); automated
# publishing can only be enabled on an already-published package.
name: Publish to pub.dev

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC token exchange
    steps:
      - uses: actions/checkout@v4

      # Skip when this version is already on pub.dev. Makes the workflow
      # idempotent: re-running a tag, or the baseline v1.0.0 tag that matches
      # the first manual publish, is a no-op instead of a hard failure.
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pub.dev/api/packages/flutter_tiny_wavpack_decoder/versions/${VERSION}")
          if [ "$CODE" = "200" ]; then
            echo "Version ${VERSION} already published; skipping."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dart-lang/setup-dart@v1 # performs the pub.dev token exchange
        if: steps.check.outputs.published == 'false'
      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.published == 'false'
        with:
          flutter-version: 3.35.7
          channel: stable
      - run: flutter pub get
        if: steps.check.outputs.published == 'false'
      - run: dart pub publish --force
        if: steps.check.outputs.published == 'false'
