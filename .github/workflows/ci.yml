name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.35.7

jobs:
  analyze:
    name: Analyze, format, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos
      - run: flutter test test/unit

  host-ffi:
    name: FFI tests vs real C (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build host native library
        run: bash tool/build_host_lib.sh
      - name: Check exported symbol (macOS)
        if: runner.os == 'macOS'
        run: nm -gU build/host/libflutter_tiny_wavpack_decoder.dylib | grep ftwd_decode
      - name: Run FFI integration tests
        run: flutter test test/ffi

  example-android:
    name: Example builds (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter build apk --debug
        working-directory: example

  example-ios:
    name: Example builds (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter build ios --debug --no-codesign
        working-directory: example

  example-web:
    name: Example builds (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter build web --release
        working-directory: example
      # The WASM decoder and its worker script must land in the built bundle.
      - name: Verify web decoder assets are bundled
        run: |
          test -f example/build/web/assets/packages/flutter_tiny_wavpack_decoder/web_assets/ftwd.wasm
          test -f example/build/web/assets/packages/flutter_tiny_wavpack_decoder/web_assets/ftwd.js
          test -f example/build/web/assets/packages/flutter_tiny_wavpack_decoder/web_assets/ftwd_worker.js

  publish-dry-run:
    name: pub.dev dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart pub publish --dry-run
