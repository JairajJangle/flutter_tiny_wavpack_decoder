# Fully automated releases from GitHub Actions. After the CI workflow
# SUCCEEDS on a push to main, decide the semantic-version bump from the
# conventional commits since the last tag (tool/release.dart), and if a
# release is warranted, bump pubspec.yaml, roll CHANGELOG.md, commit, and
# push the vX.Y.Z tag.
#
# Gated on CI via workflow_run: a red CI (format, analyze, any test or
# example build) means no release. The job releases exactly the commit CI
# validated (workflow_run.head_sha).
#
# The tag is pushed with RELEASE_TOKEN (a PAT with contents:write), and the
# release commit does NOT contain [skip ci], so the tag push cascades into
# publish.yml, which publishes to pub.dev. A tag pushed by a PAT triggers other
# workflows; the default GITHUB_TOKEN would not.
#
# The chore(release) commit landing back on main is ignored by the job guard
# below, so there is no release loop.
name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release:
    # Only after a green CI on a direct push to main, and skip the release
    # commit this workflow itself creates.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          !startsWith(github.event.workflow_run.head_commit.message, 'chore(release)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Release exactly the commit CI validated, not whatever main points
          # at by the time this job runs.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # Full history and tags for commit analysis.
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      # Everything below is skipped until RELEASE_TOKEN is set, so the workflow
      # stays green before automated releases are enabled.
      - name: Set up Flutter
        if: env.RELEASE_TOKEN != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          channel: stable

      - name: Install dependencies
        if: env.RELEASE_TOKEN != ''
        run: flutter pub get

      - name: Check formatting
        if: env.RELEASE_TOKEN != ''
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: env.RELEASE_TOKEN != ''
        run: flutter analyze --fatal-infos

      - name: Unit tests
        if: env.RELEASE_TOKEN != ''
        run: flutter test test/unit

      - name: Compute and apply release
        if: env.RELEASE_TOKEN != ''
        id: rel
        run: |
          OUTPUT=$(dart run tool/release.dart)
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | sed -n 's/^RELEASE=//p')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        if: env.RELEASE_TOKEN != '' && steps.rel.outputs.version != 'none' && steps.rel.outputs.version != ''
        run: |
          VERSION="${{ steps.rel.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          # Push branch and tag explicitly: --follow-tags would silently skip
          # lightweight tags, and we need both refs on the remote. HEAD:main
          # because the checkout is detached at the CI-validated sha; if main
          # moved since, this fails and the next green CI run releases instead.
          git push origin HEAD:main "v${VERSION}"

      - name: Create GitHub release
        if: env.RELEASE_TOKEN != '' && steps.rel.outputs.version != 'none' && steps.rel.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.rel.outputs.version }}"
          # Notes = this version's CHANGELOG section (between its heading and
          # the next "## [" heading).
          awk "/^## \\[${VERSION}\\]/{flag=1;next} /^## \\[/{flag=0} flag" \
            CHANGELOG.md > /tmp/release_notes.md
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md
