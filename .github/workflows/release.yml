# Semantic-release: on every push to main, analyze conventional commits and, if
# a release is warranted, bump pubspec.yaml, update CHANGELOG.md, commit
# "chore(release): X [skip ci]", create the GitHub release, and push the
# v{version} tag. That tag triggers publish.yml, which publishes to pub.dev.
#
# REQUIRES a repository secret RELEASE_TOKEN (a Personal Access Token with
# contents:write, or classic "repo" + "workflow" scopes). It is used instead of
# the default GITHUB_TOKEN so the pushed tag is allowed to trigger publish.yml;
# tags pushed with GITHUB_TOKEN do not start new workflow runs. Until the secret
# exists the release steps are skipped, so this workflow stays green.
#
# The release commit carries [skip ci], which GitHub honors to avoid a loop.
name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push the release commit and tag, and create the release.
      issues: write # To comment on released issues.
      pull-requests: write # To comment on released pull requests.
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history and tags for commit analysis.
          persist-credentials: true
          # PAT when configured so the pushed tag triggers publish.yml; falls
          # back to the default token (read-only for this purpose) otherwise.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      # Everything below is skipped until RELEASE_TOKEN is set, keeping the
      # workflow green before automated releases are enabled.
      - name: Set up Flutter
        if: env.RELEASE_TOKEN != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          channel: stable

      - name: Install dependencies
        if: env.RELEASE_TOKEN != ''
        run: flutter pub get

      - name: Analyze
        if: env.RELEASE_TOKEN != ''
        run: flutter analyze --fatal-infos

      - name: Unit tests
        if: env.RELEASE_TOKEN != ''
        run: flutter test test/unit

      - name: Set up Node.js
        if: env.RELEASE_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install semantic-release
        if: env.RELEASE_TOKEN != ''
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git

      - name: Release
        if: env.RELEASE_TOKEN != ''
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
